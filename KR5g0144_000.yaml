body:
  text: 洞眞太上紫文丹章洞眞太上金篇虎符眞文經洞眞太上紫文丹章一名九天玉清绿字隐文紫文丹章绿字隐文一百二十言乃九天之上炁凝紫暉之結成自然之章表见玉清宫中其文焕曜照明上清致高上注筆通其隱音以綱維玉虚制命九天常御威神召眞檢靈即元始天王所佩以傳玉清帝君消魔大王玉清神霄王等侍文玉童玉女各二十四人糾於漏慢營衛佩文者身得佩此文則與九天眞名書丹臺位准高玄身發紫光項負圓明游行太虚十界司迎致三元下降同宴霄軿修行神仙之道披誦高上玉清隐書大洞眞經當安身方丈之上心映紫文丹章左把流金火鈴右御豁落七元則玉虚不招而自降大洞不叩而發關萬眞應機而感會群魔束身而自亡運策八炁回轉五辰座命萬靈役御群仙炁合高虚形舉紫賔九天之秘奥玉清之隱文有泄此章身被風刀責及七玄生死之考一如九天盟文有金名玉字列圖九天得見此文當以絳紋之繒三尺爲地以紫筆書丹章於繒上齎紫文九十尺金魚玉龍詣師清齋九十日北向告盟九天而傳弟子受以錦囊佩之當心也得佩紫文丹章皆位准高玄得受玉清隱書位准太眞坐起寢息皆與玉虚交纏玉華衛眞於左右五帝髣髴於寢軒不得雜同於常俗混穢於高眞也犯則神逝而魔前被考而失仙也佩紫文丹章出入卧息及行道之際常當先思己身有紫暉之光玄覆於上氣繞一身便叩齒九通微祝曰玉虚九重紫暉八纏玄光垂映玉清吐津紫文丹書表明九天制命萬靈招役群仙威攝萬萬檢剪千千景響立會五雲發煙飛輿紫蓋欻來我前使我乘空高登玉晨畢便引紫炁十二嚥止如此九年即有紫雲之蓋映覆兆身身生紫光明照十方通神致眞洞覩太虚也昔上元夫人以隱文授太和玉女太和玉女授幼陽君君道成升虚以文封於九嶷洞室七百年當授合眞通玄之人後學精念自當感會豫有緣也洞眞太上紫文丹章
