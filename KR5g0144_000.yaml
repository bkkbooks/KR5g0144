  text: 二經同卷廣五
  hash: sha256:d5ec0c10fae5476c2b56505c1715aaa1aee1a1eff20a173be92ba809a04d2c7e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0144_HFL_000-001a, image: hfl/1031/1031-026.png}
body:
  text: 洞真太上紫文丹章洞真太上金篇虎符真文經洞真太上紫文丹章一名九天玉清緑字隱文紫文丹章緑字隱文一百二十言乃九天之上氣凝紫暉之結成自然之章表見玉清宫中其文焕曜照明上清致高上注筆通其隱音以綱維玉虛制命九天常御威神召真檢靈即元始天王所佩以傳玉清帝君消魔大王玉清神霄王等侍文玉童玉女各二十四人糾於漏慢營衛佩文者身得佩此文則與九天真名書丹臺位準高玄身發紫光項負圓明遊行太虛十界司迎致三元下降同宴霄軿修行神仙之道披誦高上玉清隱書大洞真經當安身方丈之上心映紫文丹章左把流金火鈴右御豁落七元則玉虛不招而自降大洞不叩而發關萬真應機而感會群魔束身而自亡運策八氣回轉五辰座命萬靈役御群仙氣合高虛形舉紫賔九天之祕奧玉清之隱文有泄此章身被風刀責及七玄生死之考一如九天盟文有金名玉字列圖九天得見此文當以絳紋之繒三尺為地以紫筆書丹章於繒上齎紫文九十尺金魚玉龍詣師清齋九十日北向告盟九天而傳弟子受以錦囊佩之當心也得佩紫文丹章皆位準高玄得受玉清隱書位準太真坐起寢息皆與玉虛交纏玉華衛真於左右五帝髣佛於寢軒不得雜同於常俗混穢於高真也犯則神逝而魔前被考而失仙也佩紫文丹章出入卧息及行道之際常當先思己身有紫暉之光玄覆於上氣繞一身便叩齒九通微祝曰玉虛九重紫暉八纏玄光垂映玉清吐津紫文丹書表明九天制命萬靈招役群仙威攝萬萬檢剪千千景響立會五雲發煙飛輿紫蓋欻來我前使我乘空高登玉晨畢便引紫氣十二咽止如此九年即有紫雲之蓋映覆兆身身生紫光明照十方通神致真洞覩太虛也昔上元夫人以隱文授太和玉女太和玉女授幼陽君君道成升虛以文封於九嶷洞室七百年當授合真通玄之人後學精念自當感會豫有緣也洞真太上紫文丹章
